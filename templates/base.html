<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}自然观察相册{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">自然观察相册</a>
        <ul class="navbar-links">
            <li><a href="/album" {% if request.url.path == '/album' %}class="active"{% endif %}>全部</a></li>
            <li><a href="/relic" {% if '/relic' in request.url.path %}class="active"{% endif %}>文物</a></li>
            <li><a href="/animal" {% if '/animal' in request.url.path %}class="active"{% endif %}>动物</a></li>
            <li><a href="/plant" {% if '/plant' in request.url.path %}class="active"{% endif %}>植物</a></li>
            <li><a href="/batch" {% if '/batch' in request.url.path %}class="active"{% endif %}>导入</a></li>
            <li><a href="/settings" {% if '/settings' in request.url.path %}class="active"{% endif %}>设置</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>

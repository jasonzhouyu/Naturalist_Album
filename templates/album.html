{% extends "base.html" %}
{% block title %}{{ label }}相册{% endblock %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1 style="margin:0">{{ label }}相册</h1>
    <a href="/upload/{{ category }}" class="btn secondary">上传照片</a>
</div>

{% if artifacts %}
<div class="album-grid" id="album-grid"></div>
<div id="album-load-sentinel" style="height:1px"></div>
<p id="album-loaded-info" style="text-align:center;color:var(--text-muted);font-size:0.85rem;padding:1rem"></p>

<script>
const ALBUM_CATEGORY = {{ category | tojson }};
const ALBUM_PAGE_SIZE = 60;
const artifacts = {{ artifacts | tojson | safe }};
let rendered = 0;

function escapeHTML(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cardHTML(a) {
    const name = escapeHTML(a.name || a.chinese_name || '未知');
    const filename = encodeURIComponent(a.filename);
    let metaLine;
    if (ALBUM_CATEGORY === 'relic') {
        const dynasty = a.dynasty ? escapeHTML(a.dynasty) : '';
        const material = a.material ? ' · ' + escapeHTML(a.material) : '';
        metaLine = `<p>${dynasty}${material}</p>`;
    } else {
        const sci = a.scientific_name ? `<em>${escapeHTML(a.scientific_name)}</em>` : '';
        metaLine = `<p>${sci}</p>`;
    }
    return `
        <a href="/${ALBUM_CATEGORY}/${a.id}" class="card-link">
            <div class="album-card">
                <img src="/thumbs/${ALBUM_CATEGORY}/${filename}" alt="${name}" loading="lazy" decoding="async">
                <div class="album-info">
                    <h3>${name}</h3>
                    ${metaLine}
                </div>
            </div>
        </a>`;
}

function loadMoreAlbum() {
    if (rendered >= artifacts.length) return;
    const slice = artifacts.slice(rendered, rendered + ALBUM_PAGE_SIZE);
    document.getElementById('album-grid').insertAdjacentHTML('beforeend', slice.map(cardHTML).join(''));
    rendered += slice.length;
    document.getElementById('album-loaded-info').textContent =
        `已加载 ${rendered} / ${artifacts.length}`;
}

loadMoreAlbum();

if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver(entries => {
        for (const e of entries) {
            if (e.isIntersecting) loadMoreAlbum();
        }
    }, {rootMargin: '800px 0px'});
    io.observe(document.getElementById('album-load-sentinel'));
}
</script>
{% else %}
<div class="empty-state">
    <p>还没有收录任何{{ label }}。</p>
    <a href="/upload/{{ category }}" class="btn">上传第一张照片</a>
</div>
{% endif %}

{% endblock %}

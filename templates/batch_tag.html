{% extends "base.html" %}
{% block title %}标记分类 - 自然观察相册{% endblock %}
{% block content %}

<ul class="breadcrumb">
    <li><a href="/">首页</a></li>
    <li><a href="/batch">批量导入</a></li>
    <li>标记分类</li>
</ul>

<h1>标记分类 <small style="font-size:0.55em;color:var(--text-muted)">{{ session.files|length }} 张照片</small></h1>
<p style="color:var(--text-muted);margin-bottom:1rem;font-size:0.85em">
    目录: {{ session.directory }}
</p>

<div class="batch-toolbar">
    <div class="toolbar-row">
        <label style="margin:0;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
            <span style="white-space:nowrap;font-weight:500;color:var(--text)">拍摄地址:</span>
            <input id="province-input" type="text" placeholder="省 (如: 新疆)" style="max-width:140px" title="提供省级信息可显著提升识别准确性">
            <input id="city-input" type="text" placeholder="市/区 (可选)" style="max-width:200px" title="更精确的位置进一步提升地域识别">
        </label>
        <button onclick="applyLocation(null)" class="secondary" style="white-space:nowrap">应用到全部</button>
        <button onclick="applyLocation(getSelectedIndices())" class="secondary" style="white-space:nowrap">应用到所选</button>
    </div>

    <div class="toolbar-row">
        <span class="toolbar-label">快速标记:</span>
        <div class="toolbar-actions">
            <button onclick="selectAll()" class="outline small">全选</button>
            <button onclick="deselectAll()" class="outline small">全不选</button>
            <span class="toolbar-sep">|</span>
            <button onclick="tagSelected('relic')" class="small tag-btn-relic">标记文物</button>
            <button onclick="tagSelected('animal')" class="small tag-btn-animal">标记动物</button>
            <button onclick="tagSelected('plant')" class="small tag-btn-plant">标记植物</button>
            <button onclick="tagSelected(null)" class="outline small">跳过所选</button>
        </div>
    </div>

    <div class="toolbar-row" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:0.75rem">
            <span id="tag-counter" class="tag-counter">已标记 0 / {{ session.files|length }}</span>
            <label style="margin:0;font-size:0.85rem;display:flex;align-items:center;gap:0.3rem;color:var(--text)">
                <input type="checkbox" id="index-only-check" checked>
                仅索引（不复制文件）
            </label>
        </span>
        <button id="process-btn" onclick="startProcess()" class="process-btn">处理全部</button>
    </div>
</div>

<div class="batch-grid" id="batch-grid"></div>
<div id="batch-load-more" style="text-align:center;padding:1.5rem;display:none">
    <button onclick="loadMore()" class="secondary">加载更多 (<span id="remaining-count">0</span>)</button>
</div>
<div id="batch-load-sentinel" style="height:1px"></div>

<div id="process-overlay" class="process-overlay" style="display:none">
    <div class="process-panel">
        <h2 id="process-title">处理中...</h2>
        <progress id="process-bar" value="0" max="100"></progress>
        <div id="process-results"></div>
        <button id="process-close" onclick="closeProcess()" style="display:none">关闭</button>
    </div>
</div>

<script>
const SESSION_ID = '{{ session.id }}';
const fileCount = {{ session.files|length }};
const PAGE_SIZE = 200;

let files = {{ session.files | tojson | safe }};
let renderedCount = 0;
let loadingMore = false;

const CATEGORY_LABELS = {relic: '文物', animal: '动物', plant: '植物'};

function escapeHTML(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const selected = new Set();

function cardHTML(f) {
    const catClass = f.category || 'none';
    const catLabel = CATEGORY_LABELS[f.category] || '未标记';
    const loc = f.location || '';
    const locHidden = loc ? '' : 'display:none';
    const safeName = escapeHTML(f.name);
    const safeLoc = escapeHTML(loc);
    const checked = selected.has(f.index) ? 'checked' : '';
    return `
        <div class="batch-card" id="card-${f.index}" data-index="${f.index}">
            <div class="batch-card-img">
                <img src="/batch-preview/${SESSION_ID}/${f.index}" alt="${safeName}" loading="lazy" decoding="async">
            </div>
            <div class="batch-card-body">
                <div class="batch-card-name" title="${safeName}">${safeName}</div>
                <div class="batch-card-tags">
                    <span id="tag-${f.index}" class="tag-pill tag-${catClass}">${catLabel}</span>
                    <span id="loc-${f.index}" class="tag-location" title="${safeLoc}" style="${locHidden}">${safeLoc}</span>
                </div>
                <input id="loc-input-${f.index}" type="text" class="card-loc-input" value="${safeLoc}" placeholder="地点" onchange="setOneLocation(${f.index}, this.value)">
                <div class="batch-card-actions">
                    <button onclick="tagOne(${f.index}, 'relic')" class="mini tag-btn-relic" title="文物">文</button>
                    <button onclick="tagOne(${f.index}, 'animal')" class="mini tag-btn-animal" title="动物">动</button>
                    <button onclick="tagOne(${f.index}, 'plant')" class="mini tag-btn-plant" title="植物">植</button>
                    <button onclick="tagOne(${f.index}, null)" class="mini outline" title="跳过">跳</button>
                </div>
                <label class="batch-card-check">
                    <input type="checkbox" class="card-checkbox" data-index="${f.index}" ${checked} onchange="onCheckboxChange(${f.index}, this.checked)">
                </label>
            </div>
        </div>`;
}

function onCheckboxChange(index, isChecked) {
    if (isChecked) selected.add(index); else selected.delete(index);
    updateCounter();
}

function appendCards(slice) {
    const grid = document.getElementById('batch-grid');
    const html = slice.map(cardHTML).join('');
    grid.insertAdjacentHTML('beforeend', html);
    renderedCount += slice.length;
    updateLoadMoreVisibility();
}

function updateLoadMoreVisibility() {
    const remaining = files.length - renderedCount;
    const wrap = document.getElementById('batch-load-more');
    if (remaining > 0) {
        wrap.style.display = '';
        document.getElementById('remaining-count').textContent = remaining;
    } else {
        wrap.style.display = 'none';
    }
}

function loadMore() {
    if (loadingMore) return;
    loadingMore = true;
    try {
        const next = files.slice(renderedCount, renderedCount + PAGE_SIZE);
        if (next.length) appendCards(next);
    } finally {
        loadingMore = false;
    }
}

function updateCounter() {
    const tagged = files.filter(f => f.category).length;
    document.getElementById('tag-counter').textContent =
        `已标记 ${tagged} / ${fileCount} | 已选 ${selected.size}`;
}

function selectAll() {
    files.forEach(f => selected.add(f.index));
    document.querySelectorAll('.card-checkbox').forEach(cb => { cb.checked = true; });
    updateCounter();
}

function deselectAll() {
    selected.clear();
    document.querySelectorAll('.card-checkbox').forEach(cb => { cb.checked = false; });
    updateCounter();
}

function getSelectedIndices() {
    return Array.from(selected);
}

async function tagOne(index, category) {
    await doTag([index], category);
}

async function tagSelected(category) {
    const indices = getSelectedIndices();
    if (indices.length === 0) {
        alert('请先勾选照片');
        return;
    }
    await doTag(indices, category);
}

async function doTag(indices, category) {
    try {
        const resp = await fetch(`/batch/${SESSION_ID}/tag`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({indices: indices, category: category})
        });
        const data = await resp.json();
        if (data.ok) {
            files = data.files;
            refreshCards();
        }
    } catch (e) {
        alert('操作失败: ' + e.message);
    }
}

function refreshCards() {
    files.forEach(f => {
        const tagEl = document.getElementById(`tag-${f.index}`);
        if (tagEl) {
            tagEl.className = 'tag-pill tag-' + (f.category || 'none');
            const labels = {relic: '文物', animal: '动物', plant: '植物', null: '未标记'};
            tagEl.textContent = labels[f.category] || '未标记';
        }
        const locEl = document.getElementById(`loc-${f.index}`);
        if (locEl) {
            if (f.location) {
                locEl.textContent = f.location;
                locEl.title = f.location;
                locEl.style.display = '';
            } else {
                locEl.style.display = 'none';
            }
        }
    });
    updateCounter();
}

function joinLocation(province, city) {
    province = (province || '').trim();
    city = (city || '').trim();
    if (province && city) return `${province} ${city}`;
    return province || city || '';
}

function splitLocation(loc) {
    if (!loc) return ['', ''];
    const parts = loc.trim().split(/\s+/);
    return [parts[0] || '', parts.slice(1).join(' ')];
}

async function applyLocation(indices) {
    const province = document.getElementById('province-input').value.trim();
    const city = document.getElementById('city-input').value.trim();
    const loc = joinLocation(province, city);
    if (!loc) {
        alert('请输入省（建议）或市');
        return;
    }
    if (indices && indices.length === 0) {
        alert('请先勾选照片，或使用"应用到全部"');
        return;
    }
    try {
        const resp = await fetch(`/batch/${SESSION_ID}/location`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({location: loc, indices: indices})
        });
        const data = await resp.json();
        if (data.ok) {
            files = data.files;
            refreshCards();
        }
    } catch (e) {
        alert('操作失败: ' + e.message);
    }
}

async function setOneLocation(index, location) {
    try {
        const resp = await fetch(`/batch/${SESSION_ID}/location`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({location: location, indices: [index]})
        });
        const data = await resp.json();
        if (data.ok) {
            files = data.files;
            refreshCards();
        }
    } catch (e) {
        alert('操作失败: ' + e.message);
    }
}

async function startProcess() {
    const tagged = files.filter(f => f.category);
    if (tagged.length === 0) {
        alert('请先标记至少一张照片');
        return;
    }
    if (!confirm(`将处理 ${tagged.length} 张标记照片，是否继续？`)) return;

    document.getElementById('process-overlay').style.display = 'flex';
    document.getElementById('process-results').innerHTML = '';
    const bar = document.getElementById('process-bar');
    const title = document.getElementById('process-title');

    const indexOnly = document.getElementById('index-only-check').checked;

    try {
        const resp = await fetch(`/batch/${SESSION_ID}/process`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({index_only: indexOnly})
        });
        const data = await resp.json();

        const resultsDiv = document.getElementById('process-results');
        let successCount = 0;
        let failCount = 0;

        data.results.forEach(r => {
            if (r.ok) {
                successCount++;
                const name = r.artifact.name || r.artifact.chinese_name || '未知';
                resultsDiv.innerHTML += `<p class="success">
                    ${r.file} → <a href="/${r.artifact.category}/${r.artifact.id}">${name}</a>
                </p>`;
            } else {
                failCount++;
                resultsDiv.innerHTML += `<p class="error">${r.file}: ${r.error}</p>`;
            }
        });

        bar.value = 100;
        title.textContent = `处理完成: ${successCount} 成功, ${failCount} 失败`;

        const categories = [...new Set(data.results.filter(r => r.ok).map(r => r.artifact.category))];
        resultsDiv.innerHTML += '<div style="margin-top:1rem">';
        categories.forEach(c => {
            const labels = {relic: '文物相册', animal: '动物相册', plant: '植物相册'};
            resultsDiv.innerHTML += `<a href="/${c}" class="btn secondary" style="margin:0.25rem">${labels[c]}</a> `;
        });
        resultsDiv.innerHTML += '</div>';
    } catch (e) {
        title.textContent = '处理失败';
        document.getElementById('process-results').innerHTML = `<p class="error">${e.message}</p>`;
    }

    bar.value = 100;
    document.getElementById('process-close').style.display = 'inline-block';
}

function closeProcess() {
    document.getElementById('process-overlay').style.display = 'none';
}

// 初始化省/市输入框（从 session.default_location 拆出）
const _defaultLoc = {{ session.default_location | tojson | safe }} || '';
const [_initProv, _initCity] = splitLocation(_defaultLoc);
document.getElementById('province-input').value = _initProv;
document.getElementById('city-input').value = _initCity;

// 初始渲染：先吐 PAGE_SIZE 张，超出部分滚动到底自动追加
appendCards(files.slice(0, PAGE_SIZE));
updateCounter();

if ('IntersectionObserver' in window) {
    const sentinel = document.getElementById('batch-load-sentinel');
    const io = new IntersectionObserver(entries => {
        for (const e of entries) {
            if (e.isIntersecting) loadMore();
        }
    }, {rootMargin: '600px 0px'});
    io.observe(sentinel);
}
</script>

{% endblock %}

{% extends "base.html" %}
{% block title %}自然观察相册{% endblock %}
{% block content %}

<h1>选择品类</h1>

<div style="text-align:center;margin-bottom:2rem">
    <a href="/batch" role="button" style="font-size:1.1em;padding:0.6em 2em">批量导入</a>
    <p style="color:var(--pico-muted-color);font-size:0.85em;margin-top:0.5em">从本地目录批量导入照片，标记分类后统一处理</p>
</div>

<div class="category-grid">
    <a href="/relic" class="category-card">
        <article>
            <div class="category-icon">🏺</div>
            <h2>文物</h2>
            <p>识别文物朝代、材质、出土地，生成专业简介</p>
            <small>{{ counts.relic }} 条记录</small>
        </article>
    </a>

    <a href="/animal" class="category-card">
        <article>
            <div class="category-icon">🐾</div>
            <h2>动物</h2>
            <p>识别物种分类（界门纲目科属种）、分布区域、栖息环境</p>
            <small>{{ counts.animal }} 条记录</small>
        </article>
    </a>

    <a href="/plant" class="category-card">
        <article>
            <div class="category-icon">🌿</div>
            <h2>植物</h2>
            <p>识别物种分类、分布区域、生长环境、生态价值</p>
            <small>{{ counts.plant }} 条记录</small>
        </article>
    </a>
</div>

{% endblock %}

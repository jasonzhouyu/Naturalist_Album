{% extends "base.html" %}
{% block title %}自然观察相册{% endblock %}
{% block content %}

<div class="hero-actions">
    <h1>自然观察相册</h1>
    <a href="/batch" class="btn">批量导入</a>
    <p>从本地目录批量导入照片，标记分类后统一处理</p>
</div>

<div class="category-grid">
    <a href="/relic" class="category-card relic">
        <div class="category-card-inner">
            <div class="category-icon">🏺</div>
            <h2>文物</h2>
            <p>识别文物朝代、材质、出土地，生成专业简介</p>
            <span class="count">{{ counts.relic }} 条记录</span>
        </div>
    </a>

    <a href="/animal" class="category-card animal">
        <div class="category-card-inner">
            <div class="category-icon">🐾</div>
            <h2>动物</h2>
            <p>识别物种分类（界门纲目科属种）、分布区域、栖息环境</p>
            <span class="count">{{ counts.animal }} 条记录</span>
        </div>
    </a>

    <a href="/plant" class="category-card plant">
        <div class="category-card-inner">
            <div class="category-icon">🌿</div>
            <h2>植物</h2>
            <p>识别物种分类、分布区域、生长环境、生态价值</p>
            <span class="count">{{ counts.plant }} 条记录</span>
        </div>
    </a>
</div>

{% endblock %}

{% extends "base.html" %}
{% block title %}设置 - 自然观察相册{% endblock %}
{% block content %}

<ul class="breadcrumb">
    <li><a href="/">首页</a></li>
    <li>设置</li>
</ul>

<h1>设置</h1>

<div class="batch-scan-form">
    <div class="import-card">
        <label>
            <strong style="color:var(--text)">照片存储路径</strong>
            <small style="display:block;color:var(--text-muted);margin:0.3rem 0 0.5rem">
                所有识别归档的照片和缩略图将保存在此路径下的 album/ 和 thumbs/ 目录中
            </small>
            <input
                id="storage-path"
                type="text"
                value="{{ settings.storage_path }}"
                placeholder="例如: D:\Photos\NatureAlbum"
                style="font-family: monospace"
            >
        </label>
        <div id="save-error" class="error-message" style="display:none"></div>
        <div id="save-ok" style="color:var(--success);display:none;margin-bottom:0.75rem;font-size:0.9rem">保存成功</div>
        <button onclick="doSave()" id="save-btn">保存</button>
    </div>

    <div class="settings-panel">
        <h3 style="margin-top:0">当前目录结构</h3>
        <pre style="margin:0">{{ settings.storage_path }}
  ├── album/
  │   ├── relic/
  │   ├── animal/
  │   └── plant/
  └── thumbs/
      ├── relic/
      ├── animal/
      └── plant/</pre>
    </div>
</div>

<script>
async function doSave() {
    const input = document.getElementById('storage-path');
    const btn = document.getElementById('save-btn');
    const errDiv = document.getElementById('save-error');
    const okDiv = document.getElementById('save-ok');
    const path = input.value.trim();

    errDiv.style.display = 'none';
    okDiv.style.display = 'none';

    if (!path) {
        errDiv.textContent = '请输入存储路径';
        errDiv.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = '保存中...';

    try {
        const resp = await fetch('/settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({storage_path: path})
        });
        const data = await resp.json();
        if (data.error) {
            errDiv.textContent = data.error;
            errDiv.style.display = 'block';
        } else {
            okDiv.style.display = 'block';
            setTimeout(() => okDiv.style.display = 'none', 3000);
        }
    } catch (e) {
        errDiv.textContent = '请求失败: ' + e.message;
        errDiv.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = '保存';
}
</script>

{% endblock %}
